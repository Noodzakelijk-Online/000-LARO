# Phase 068 — CI/CD quality gates.
# Runs on pushes/PRs to the main lines. BLOCKING gates: server typecheck, main
# typecheck, and the test suite (all currently green). Non-blocking (reported but
# not failing yet): lint and renderer typecheck, which carry pre-existing debt
# tracked for Phase 041.
name: CI

on:
  push:
    branches: [main, staging, Phase-Imp]
  pull_request:
    branches: [main, staging]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # better-sqlite3 needs a native build; --ignore-scripts skips the Electron
      # rebuild (not needed for typecheck/tests) but we still build the binding.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3)
        run: npm rebuild better-sqlite3

      # ── BLOCKING gates ──────────────────────────────────────────────
      - name: Typecheck (server)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Typecheck (electron main)
        run: npx tsc -p tsconfig.main.json --noEmit

      - name: Test suite
        run: npx vitest run

      # ── NON-BLOCKING (reported; pre-existing debt — Phase 041) ───────
      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Typecheck (renderer, non-blocking)
        run: npx tsc -p tsconfig.renderer.json --noEmit || true
