name: Build and Release LARO Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate tagged release metadata and signing configuration
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          WINDOWS_SIGNING_PROVIDER: ${{ vars.WINDOWS_SIGNING_PROVIDER }}
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_PROFILE }}
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ('${{ github.ref_name }}' -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PROVIDER) -or $env:WINDOWS_SIGNING_PROVIDER -eq 'unsigned') {
            Write-Warning 'Publishing an unsigned Windows executable. Windows may show an unknown-publisher warning.'
          } elseif ($env:WINDOWS_SIGNING_PROVIDER -eq 'pfx') {
            if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_LINK)) {
              throw 'WINDOWS_CSC_LINK is required when WINDOWS_SIGNING_PROVIDER=pfx'
            }
            if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_KEY_PASSWORD)) {
              throw 'WINDOWS_CSC_KEY_PASSWORD is required when WINDOWS_SIGNING_PROVIDER=pfx'
            }
          } elseif ($env:WINDOWS_SIGNING_PROVIDER -eq 'azure-artifact-signing') {
            $required = @(
              'AZURE_CLIENT_ID',
              'AZURE_TENANT_ID',
              'AZURE_SUBSCRIPTION_ID',
              'AZURE_ARTIFACT_SIGNING_ENDPOINT',
              'AZURE_ARTIFACT_SIGNING_ACCOUNT',
              'AZURE_ARTIFACT_SIGNING_PROFILE'
            )
            $missing = @($required | Where-Object {
              [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_))
            })
            if ($missing.Count -gt 0) {
              throw "Azure Artifact Signing configuration is incomplete: $($missing -join ', ')"
            }
          } elseif ($env:WINDOWS_SIGNING_PROVIDER -eq 'sslcom-esigner') {
            $required = @(
              'SSL_COM_USERNAME',
              'SSL_COM_PASSWORD',
              'SSL_COM_CREDENTIAL_ID',
              'SSL_COM_TOTP_SECRET'
            )
            $missing = @($required | Where-Object {
              [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_))
            })
            if ($missing.Count -gt 0) {
              throw "SSL.com eSigner configuration is incomplete: $($missing -join ', ')"
            }
          } elseif ($env:WINDOWS_SIGNING_PROVIDER -eq 'microsoft-store') {
            throw 'Microsoft Store distribution is selected. Portable tagged releases are prohibited; run the Store submission workflow instead.'
          } else {
            throw 'WINDOWS_SIGNING_PROVIDER must be unsigned, microsoft-store, pfx, azure-artifact-signing, or sslcom-esigner'
          }
      - name: Validate external release acceptance
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/release-acceptance.mjs --require-approved --tag "${{ github.ref_name }}"
      - name: Run production quality gate
        run: npm run gate
      - name: Build application
        run: npm run build
      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron
      - name: Verify Electron native database binding
        run: npm run verify:electron-native
      - name: Package Windows portable application
        run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ vars.WINDOWS_SIGNING_PROVIDER == 'pfx' && secrets.WINDOWS_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ vars.WINDOWS_SIGNING_PROVIDER == 'pfx' && secrets.WINDOWS_CSC_KEY_PASSWORD || '' }}
      - name: Resolve portable artifact
        id: portable
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $matches = @(Get-ChildItem "release/$version" -File -Filter 'LARO Desktop *.exe')
          if ($matches.Count -ne 1) {
            throw "Expected one portable executable, found $($matches.Count)"
          }
          "path=$($matches[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Sign in to Azure with GitHub OIDC
        if: startsWith(github.ref, 'refs/tags/') && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign portable application with Azure Artifact Signing
        if: startsWith(github.ref, 'refs/tags/') && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files: ${{ steps.portable.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Sign portable application with SSL.com eSigner
        if: startsWith(github.ref, 'refs/tags/') && vars.WINDOWS_SIGNING_PROVIDER == 'sslcom-esigner'
        # Official v1.3.2 action pinned to its verified commit.
        uses: sslcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ steps.portable.outputs.path }}
          malware_block: true
          override: true
          environment_name: PROD
          clean_logs: true
      - name: Verify and stage release artifact
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $portable = Get-Item -LiteralPath '${{ steps.portable.outputs.path }}'
          $provider = '${{ vars.WINDOWS_SIGNING_PROVIDER }}'
          if ('${{ github.ref_type }}' -eq 'tag' -and -not [string]::IsNullOrWhiteSpace($provider) -and $provider -ne 'unsigned') {
            $signature = Get-AuthenticodeSignature $portable.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Tagged release is not validly signed: $($signature.Status)"
            }
          } elseif ('${{ github.ref_type }}' -eq 'tag') {
            Write-Warning 'Tagged release is unsigned by owner-selected policy.'
          }
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $published = "release-artifacts/LARO-Desktop-$version-Windows-x64.exe"
          Copy-Item -LiteralPath $portable.FullName -Destination $published
          $hash = (Get-FileHash -Algorithm SHA256 $published).Hash.ToLowerInvariant()
          "$hash *$(Split-Path $published -Leaf)" | Set-Content "$published.sha256" -Encoding ascii
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: LARO-Desktop-Windows
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: LARO-Desktop-Windows
          path: release/windows
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LARO Desktop ${{ github.ref_name }}
          body: |
            ## LARO Desktop ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | Windows 10/11 | LARO Desktop portable executable |

            ### Installation
            1. Download the Windows executable.
            2. Run it and complete provider setup in LARO when needed.
          files: release/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
