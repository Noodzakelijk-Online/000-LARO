name: Build & Release LARO Desktop

on:
  push:
    branches:
      - 'staging'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
      - name: Build renderer
        run: npm run build:renderer
      - name: Build main process
        run: npm run build:main
      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LARO-Desktop-Windows
          path: release/*.exe
          if-no-files-found: error

  # build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
      - name: Build renderer
        run: npm run build:renderer
      - name: Build main process
        run: npm run build:main
      - name: Package macOS dmg
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LARO-Desktop-Mac
          path: release/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LARO-Desktop-Windows
          path: release/windows
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: LARO-Desktop-Mac
          path: release/mac
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LARO Desktop ${{ github.ref_name }}
          body: |
            ## LARO Desktop ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | Windows 10/11 | `LARO Desktop Setup.exe` |
            | macOS | `LARO Desktop.dmg` |

            ### Installation
            1. Install Docker Desktop first (https://docker.com)
            2. Run the installer
            3. Open LARO Desktop — dashboard loads automatically
          files: |
            release/windows/*.exe
            release/mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          