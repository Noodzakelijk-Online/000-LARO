name: Build and Release LARO Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild native modules for Node
        run: npm run rebuild:node
      - name: Run production quality gate
        run: node scripts/stabilization-gate.mjs
      - name: Build application
        run: npm run build
      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron
      - name: Verify Electron native database binding
        run: npm run verify:electron-native
      - name: Package Windows portable application
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LARO-Desktop-Windows
          path: release/**/*.exe
          if-no-files-found: error

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LARO-Desktop-Windows
          path: release/windows
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LARO Desktop ${{ github.ref_name }}
          body: |
            ## LARO Desktop ${{ github.ref_name }}

            | Platform | Download |
            |----------|----------|
            | Windows 10/11 | LARO Desktop portable executable |

            ### Installation
            1. Download the Windows executable.
            2. Run it and complete provider setup in LARO when needed.
          files: release/windows/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
