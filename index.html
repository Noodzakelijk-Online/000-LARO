<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    CSP: allow scripts from self only, styles inline (Tailwind needs it),
    connect to localhost and any https for API calls.
  -->
  <link
    rel="icon"
    type="image/png"
    href="/laro-logo.png"
  />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      connect-src 'self' http://localhost:* http://127.0.0.1:* https://* ws://localhost:* ws://127.0.0.1:* wss://localhost:* wss://127.0.0.1:*;
      img-src 'self' data: https:;
    "
  />
  <title>LARO | Legal Evidence Workspace</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/renderer/main.tsx"></script>
</body>
</html>
