<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | LARO</title>
    <style>
        :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
        * { box-sizing: border-box; }
        body { background: #08101d; color: #f7f9fc; margin: 0; min-height: 100vh; }
        header { border-bottom: 1px solid #26354c; padding: 1rem clamp(1rem, 5vw, 3rem); }
        header strong { font-size: 1.1rem; }
        main { margin: 0 auto; max-width: 560px; padding: clamp(2rem, 8vw, 5rem) 1rem; }
        h1 { font-size: clamp(1.7rem, 5vw, 2.35rem); margin: 0 0 0.65rem; }
        p { color: #a9b7ca; line-height: 1.55; }
        form { border-top: 1px solid #26354c; margin-top: 1.5rem; padding-top: 1.5rem; }
        label { display: block; font-size: 0.9rem; font-weight: 700; margin: 1rem 0 0.4rem; }
        .password-input { background: #0d1828; border: 1px solid #344761; border-radius: 6px; color: inherit; font: inherit; min-height: 44px; padding: 0.7rem 0.8rem; width: 100%; }
        .visually-hidden { height: 1px; margin: -1px; overflow: hidden; padding: 0; position: absolute; width: 1px; clip: rect(0 0 0 0); white-space: nowrap; }
        .toggle { align-items: center; color: #a9b7ca; display: flex; font-size: 0.85rem; gap: 0.45rem; margin-top: 0.75rem; }
        button { background: #e85f00; border: 1px solid #e85f00; border-radius: 6px; color: #fff; cursor: pointer; font: inherit; font-weight: 800; margin-top: 1.25rem; min-height: 44px; padding: 0.7rem 1rem; width: 100%; }
        button:disabled { cursor: wait; opacity: 0.65; }
        #status { min-height: 1.5rem; }
        #status.error { color: #ff9b91; }
        #status.success { color: #74d8a2; }
        a { color: #7dc4ff; }
    </style>
</head>
<body>
    <header><strong>LARO</strong></header>
    <main>
        <h1>Reset your password</h1>
        <p>Choose a new password of at least eight characters. Completing this reset signs out existing sessions.</p>
        <form id="resetForm">
            <label class="visually-hidden" for="username">Account</label>
            <input class="visually-hidden" id="username" name="username" type="text" autocomplete="username" tabindex="-1">
            <label for="password">New password</label>
            <input class="password-input" id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
            <label for="confirmPassword">Confirm password</label>
            <input class="password-input" id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
            <label class="toggle"><input id="showPassword" type="checkbox"> Show passwords</label>
            <button id="submitButton" type="submit">Update password</button>
        </form>
        <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
        const form = document.getElementById("resetForm");
        const password = document.getElementById("password");
        const confirmation = document.getElementById("confirmPassword");
        const status = document.getElementById("status");
        const submitButton = document.getElementById("submitButton");
        const token = new URLSearchParams(window.location.search).get("token") || "";

        document.getElementById("showPassword").addEventListener("change", (event) => {
            const type = event.target.checked ? "text" : "password";
            password.type = type;
            confirmation.type = type;
        });

        if (!token) {
            form.hidden = true;
            status.className = "error";
            status.textContent = "This reset link is incomplete. Request a new password reset.";
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            status.className = "";
            if (password.value !== confirmation.value) {
                status.className = "error";
                status.textContent = "The passwords do not match.";
                return;
            }
            submitButton.disabled = true;
            try {
                const response = await fetch(`/api/auth/reset-password/${encodeURIComponent(token)}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: password.value })
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(result.error || "Password reset failed");
                form.hidden = true;
                status.className = "success";
                status.innerHTML = 'Password updated. <a href="/dashboard_dark.html">Return to LARO</a>.';
                window.history.replaceState({}, document.title, "/reset-password.html");
            } catch (error) {
                status.className = "error";
                status.textContent = error.message;
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
