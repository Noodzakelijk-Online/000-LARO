# Phase 032 — run the LARO API server with a persistent data volume.
# Usage: docker compose up --build
# (Runs the server backend only, not the Electron desktop app.)
services:
  laro-server:
    build: .
    image: laro-server
    ports:
      # Keep the API off the LAN. ngrok connects to this loopback listener.
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      SERVER_ONLY: "true"
      LARO_APP_VERSION: ${LARO_APP_VERSION:-unknown}
      ALLOWED_ORIGINS: ${LARO_PUBLIC_ORIGIN:-}
      OAUTH_REDIRECT_BASE_URL: ${LARO_PUBLIC_BASE_URL:-http://127.0.0.1:3000}
      PUBLIC_PATH_PREFIX: ${LARO_PUBLIC_PATH_PREFIX:-}
      DATABASE_URL: /data/laro-server.sqlite
      LOCAL_STORAGE_DIR: /data/uploads
    volumes:
      - laro-data:/data
    restart: unless-stopped

volumes:
  laro-data:
