# Stack: Drizzle + mysql2. New MySQL volumes run docker/mysql/init/*.sql.
# Existing volumes with old tables: docker/mysql/patch-usage-schema.sql (see file header).

services:
  mysql:
    image: mysql:8.0
    container_name: laro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_change_me
      MYSQL_DATABASE: laro_db
      MYSQL_USER: laro
      MYSQL_PASSWORD: laro_secure_password
    ports:
      - "3306:3306"
    volumes:
      - laro_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secure_change_me"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: laro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - laro_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: laro-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: ["node", "--max-old-space-size=512", "dist/server/index.js"]
    mem_limit: 768m
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://laro:laro_secure_password@mysql:3306/laro_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      COOKIE_SECRET: ${COOKIE_SECRET:-change_this_too}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  laro_mysql_data:
  laro_redis_data:
